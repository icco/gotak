basePath: /
definitions:
  gotak.Board:
    properties:
      size:
        format: int64
        type: integer
      squares:
        additionalProperties:
          items:
            $ref: '#/definitions/gotak.Stone'
          type: array
        type: object
    type: object
  gotak.Game:
    properties:
      board:
        $ref: '#/definitions/gotak.Board'
      id:
        format: int64
        type: integer
      meta:
        items:
          $ref: '#/definitions/gotak.Tag'
        type: array
      slug:
        type: string
      turns:
        items:
          $ref: '#/definitions/gotak.Turn'
        type: array
    type: object
  gotak.Move:
    properties:
      moveCount:
        description: Move only
        format: int64
        type: integer
      moveDirection:
        type: string
      moveDropCounts:
        items:
          format: int64
          type: integer
        type: array
      square:
        type: string
      stone:
        description: Both Drop and Move
        type: string
      text:
        type: string
    type: object
  gotak.Stone:
    properties:
      player:
        type: integer
      type:
        type: string
    type: object
  gotak.Tag:
    properties:
      key:
        type: string
      value:
        type: string
    type: object
  gotak.Turn:
    properties:
      branch:
        description: |-
          Branch is the optional PTN branch label appended to the turn
          number (e.g. `1a.` -> "a"). Main-line turns leave it empty.
        type: string
      comment:
        type: string
      first:
        $ref: '#/definitions/gotak.Move'
      number:
        format: int64
        type: integer
      result:
        type: string
      second:
        $ref: '#/definitions/gotak.Move'
    type: object
  main.AnalyzeRequest:
    type: object
  main.AnalyzeResponse:
    properties:
      agreed:
        type: integer
      level:
        type: string
      move_count:
        type: integer
      moves:
        items:
          $ref: '#/definitions/main.MoveAnalysis'
        type: array
      size:
        type: integer
      slug:
        type: string
    type: object
  main.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/main.User'
    type: object
  main.ConfirmResetRequest:
    properties:
      new_password:
        example: newsecretpassword
        type: string
      token:
        example: reset-token-here
        type: string
    type: object
  main.CreateGameRequest:
    properties:
      size:
        example: "8"
        type: string
    type: object
  main.ErrorResponse:
    properties:
      error:
        example: Something went wrong
        type: string
    type: object
  main.HealthResponse:
    properties:
      branch:
        example: main
        type: string
      healthy:
        example: "true"
        type: string
      revision:
        example: abc123def
        type: string
      tag:
        example: v1.0.0
        type: string
    type: object
  main.LoginRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: secretpassword
        type: string
    type: object
  main.MessageResponse:
    properties:
      message:
        example: Operation successful
        type: string
    type: object
  main.MoveAnalysis:
    properties:
      agreed:
        type: boolean
      best:
        type: string
      error:
        description: |-
          Error captures why the engine couldn't evaluate this move, if any.
          When non-empty, Best and Agreed should be ignored.
        type: string
      played:
        type: string
      player:
        type: integer
      turn:
        type: integer
    type: object
  main.MoveRequest:
    properties:
      move:
        example: c3
        type: string
      player:
        example: 1
        type: integer
      turn:
        example: 1
        type: integer
    type: object
  main.PositionResponse:
    properties:
      board:
        additionalProperties:
          items:
            $ref: '#/definitions/gotak.Stone'
          type: array
        type: object
      size:
        type: integer
      slug:
        type: string
      turn:
        type: integer
    type: object
  main.RegisterRequest:
    properties:
      email:
        example: user@example.com
        type: string
      name:
        example: John Doe
        type: string
      password:
        example: secretpassword
        type: string
    type: object
  main.ReplayResponse:
    properties:
      size:
        type: integer
      slug:
        type: string
      steps:
        items:
          $ref: '#/definitions/main.ReplayStep'
        type: array
    type: object
  main.ReplayStep:
    properties:
      board:
        additionalProperties:
          items:
            $ref: '#/definitions/gotak.Stone'
          type: array
        type: object
      move:
        type: string
      player:
        type: integer
      turn:
        type: integer
    type: object
  main.ResetPasswordRequest:
    properties:
      email:
        example: user@example.com
        type: string
    type: object
  main.UpdateProfileRequest:
    properties:
      name:
        type: string
      preferences:
        type: string
    type: object
  main.User:
    properties:
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      preferences:
        type: string
      provider:
        type: string
      provider_id:
        type: string
      updated_at:
        type: string
    type: object
host: gotak.app
info:
  contact:
    name: API Support
    url: http://github.com/icco/gotak
  description: A Tak game server API with authentication
  license:
    name: MIT
    url: https://github.com/icco/gotak/blob/main/LICENSE
  title: GoTak API
  version: "1.0"
paths:
  /:
    get:
      consumes:
      - application/json
      description: Returns basic API information and available endpoints
      produces:
      - text/html
      responses:
        "200":
          description: HTML page with API information
          schema:
            type: string
      summary: Get API information
      tags:
      - info
  /analyze/game/{slug}:
    post:
      consumes:
      - application/json
      description: |-
        Walks the game move-by-move, asking the AI engine what it
        would play at each position, and records whether the player's
        move matches. Useful as a rough "blunder detector".
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      - description: Engine config (optional)
        in: body
        name: request
        schema:
          $ref: '#/definitions/main.AnalyzeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.AnalyzeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Analyze a game move-by-move
      tags:
      - analysis
  /auth/confirm-reset:
    post:
      consumes:
      - application/json
      description: Reset password with token
      parameters:
      - description: Confirm reset request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.ConfirmResetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.MessageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Confirm password reset
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password
      parameters:
      - description: User login data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/main.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Login user
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logout current user (client should discard token)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.MessageResponse'
      summary: Logout user
      tags:
      - auth
  /auth/profile:
    get:
      consumes:
      - application/json
      description: Get current user profile information
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.User'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - auth
    put:
      consumes:
      - application/json
      description: Update current user profile information
      parameters:
      - description: Profile update data
        in: body
        name: profile
        required: true
        schema:
          $ref: '#/definitions/main.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.User'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register with email and password
      parameters:
      - description: User registration data
        in: body
        name: user
        required: true
        schema:
          $ref: '#/definitions/main.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/main.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Send password reset token for email
      parameters:
      - description: Reset password request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.MessageResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Request password reset
      tags:
      - auth
  /game/{slug}:
    get:
      consumes:
      - application/json
      description: Returns the current state of a game
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gotak.Game'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get game state
      tags:
      - game
  /game/{slug}/{turn}:
    get:
      consumes:
      - application/json
      description: Returns the state of a game at a specific turn
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      - description: Turn number
        in: path
        name: turn
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gotak.Turn'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get specific turn
      tags:
      - game
  /game/{slug}/join:
    post:
      consumes:
      - application/json
      description: Join a game that is waiting for a second player (as black player)
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Join a waiting game
      tags:
      - game
  /game/{slug}/move:
    post:
      consumes:
      - application/json
      description: Submit a move for a specific game
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      - description: Move details
        in: body
        name: move
        required: true
        schema:
          $ref: '#/definitions/main.MoveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/gotak.Game'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Make a move in a game
      tags:
      - game
  /game/{slug}/position/{turn}:
    get:
      consumes:
      - application/json
      description: |-
        Replays the game forward until it has applied every move
        of every turn with Number <= turn, then returns the
        resulting board. turn=0 yields the starting (empty)
        position; turn beyond the final turn yields the final
        position.
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      - description: Turn number (0 = starting position)
        in: path
        name: turn
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.PositionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get board state after N complete turns
      tags:
      - game
  /game/{slug}/ptn:
    get:
      description: Serialises the game as Portable Tak Notation text.
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      produces:
      - text/plain
      responses:
        "200":
          description: PTN text
          schema:
            type: string
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Download game as PTN
      tags:
      - game
  /game/{slug}/replay:
    get:
      consumes:
      - application/json
      description: |-
        Returns an ordered list of every half-turn played in the
        game, along with the board state after each one, so a
        client can step through without making per-turn requests.
      parameters:
      - description: Game slug identifier
        in: path
        name: slug
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.ReplayResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Get full game replay
      tags:
      - game
  /game/new:
    get:
      consumes:
      - application/json
      description: Creates a new Tak game with the specified board size
      parameters:
      - description: Game configuration
        in: body
        name: game
        schema:
          $ref: '#/definitions/main.CreateGameRequest'
      produces:
      - application/json
      responses:
        "307":
          description: Redirect to game URL
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create a new game
      tags:
      - game
    post:
      consumes:
      - application/json
      description: Creates a new Tak game with the specified board size
      parameters:
      - description: Game configuration
        in: body
        name: game
        schema:
          $ref: '#/definitions/main.CreateGameRequest'
      produces:
      - application/json
      responses:
        "307":
          description: Redirect to game URL
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/main.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/main.ErrorResponse'
      summary: Create a new game
      tags:
      - game
  /healthz:
    get:
      consumes:
      - application/json
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.HealthResponse'
      summary: Health check
      tags:
      - health
securityDefinitions:
  BearerAuth:
    description: 'JWT token in format: Bearer {token}'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
